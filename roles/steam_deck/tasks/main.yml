- name: Install packages via pacman
  become: true
  community.general.pacman:
    name:
      - curl
      - flatpak
      - vim
      - stow
    state: present

- name: Ensure vi alias points to vim
  ansible.builtin.lineinfile:
    path: "{{ home_directory }}/.bashrc"
    line: "alias vi=vim"

- name: Ensure Flathub remote exists
  become: true
  community.general.flatpak_remote:
    name: flathub
    state: present
    flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo

- name: Install RetroArch via Flatpak
  community.general.flatpak:
    name: org.libretro.RetroArch
    state: present
    method: user

- name: Ensure ~/.local/bin exists
  ansible.builtin.file:
    path: "{{ home_directory }}/.local/bin"
    state: directory
    mode: "0755"

- name: Download Filen CLI binary
  vars:
    filen_version: "0.0.36"
  ansible.builtin.get_url:
    url: "https://github.com/FilenCloudDienste/filen-cli/releases/download/v{{ filen_version }}/filen-cli-v{{ filen_version }}-linux-x64"
    dest: "{{ home_directory }}/.local/bin/filen"
    mode: "0755"
    force: true

- name: Ensure ~/.local/bin is in PATH
  ansible.builtin.lineinfile:
    path: "{{ home_directory }}/.bashrc"
    line: 'export PATH="$HOME/.local/bin:$PATH"'

- name: Ensure Filen config directory exists
  ansible.builtin.file:
    path: "{{ home_directory }}/.config/filen-cli"
    state: directory
    mode: "0755"

- name: Ensure Cloud/Games directory exists
  ansible.builtin.file:
    path: "{{ home_directory }}/.config/filen-cli"
    state: directory
    mode: "0755"

- name: Deploy syncPairs.json
  ansible.builtin.copy:
    dest: "{{ home_directory }}/.config/filen-cli/syncPairs.json"
    mode: "0644"
    content: |
      [
        {
          "alias": "games",
          "local": "/home/deck/Cloud/Games",
          "remote": "/Games",
          "syncMode": "twoWay"
        }
      ]

- name: Ensure systemd user directory exists
  ansible.builtin.file:
    path: "{{ home_directory }}/.config/systemd/user"
    state: directory
    mode: "0755"

- name: Deploy filen-sync.service
  ansible.builtin.copy:
    dest: "{{ home_directory }}/.config/systemd/user/filen-sync.service"
    mode: "0644"
    content: |
      [Unit]
      Description=Filen Sync
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart=%h/.local/bin/filen sync --continuous
      Restart=always
      RestartSec=10
      StartLimitIntervalSec=0

      [Install]
      WantedBy=default.target

- name: Reload systemd user daemon
  ansible.builtin.systemd:
    daemon_reload: true
    scope: user

- name: Enable and start filen-sync service
  ansible.builtin.systemd:
    name: filen-sync.service
    enabled: true
    state: started
    scope: user
